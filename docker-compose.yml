services:
  orchestrator:
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./config:/config
      - ./media:/media
      - db-data:/data # <--- Change this from ./data:/data
      # Universal Drive Mapping (Define these in your .env file)
      - fastmedia_share:/mnt/d
      #- ${DRIVE_E_PATH:-./media/e_placeholder}:/mnt/e
      #- ${DRIVE_F_PATH:-./media/f_placeholder}:/mnt/f

    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - CONFIG_DIR=/config
      - MEDIA_DIR=/media
      - DATABASE_DIR=/data
      # API Keys (optional if set via UI)
      # - TMDB_API_KEY=your_key_here
      # - OMDB_API_KEY=your_key_here
      # - HTTP_PROXY=http://your-proxy-ip:port
      # - HTTPS_PROXY=http://your-proxy-ip:port
    restart: unless-stopped

volumes:
  db-data: # <--- Define the volume here
  fastmedia_share:
    driver_opts:
      type: cifs
      o: "username=${SMB_USER},password=${SMB_PASSWORD},vers=3.0"
      device: "//192.168.1.9/FastMedia"
